    <title>NETFLIX SNIPER 2000</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --hot-pink: #ff00ff;
            --cyber-blue: #00ffff;
            --slime-green: #39ff14;
            --win-gray: #c0c0c0;
            --win-dark: #808080;
        }

        body {
            background-color: #008080;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            font-family: 'VT323', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        .window {
            width: 100%;
            max-width: 380px;
            background: var(--win-gray);
            border: 3px solid;
            border-color: #fff #808080 #808080 #fff;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.5);
            padding: 2px;
            box-sizing: border-box;
        }

        .title-bar {
            background: linear-gradient(90deg, #000080, #1084d0);
            color: white;
            padding: 4px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .title-bar-text { font-size: 16px; }
        .title-bar-controls { display: flex; gap: 2px; }
        .title-bar-controls button {
            width: 18px;
            height: 18px;
            background: var(--win-gray);
            border: 2px solid;
            border-color: #fff #000 #000 #fff;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .content {
            padding: 15px;
            text-align: center;
            border: 2px inset #fff;
            background: #fff;
            margin-top: 4px;
        }

        h1 {
            color: #ff0000;
            text-shadow: 2px 2px var(--cyber-blue);
            font-size: 34px;
            margin: 5px 0 10px 0;
            font-style: italic;
        }

        .marquee {
            background: #000;
            color: var(--slime-green);
            padding: 5px;
            margin-bottom: 15px;
            font-size: 18px;
            border: 2px solid var(--win-dark);
        }

        .filter-sec {
            background: var(--win-gray);
            border: 2px inset #fff;
            padding: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
        }

        .filter-sec label { font-size: 14px; font-weight: bold; color: #000; }
        select {
            background: #fff;
            border: 2px solid var(--win-dark);
            font-family: 'VT323', monospace;
            font-size: 18px;
            padding: 4px;
            flex: 1;
        }

        .result-box {
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 3px dashed var(--hot-pink);
            margin-bottom: 20px;
            padding: 15px 10px;
            background: #fdfdfd;
        }

        #movie-title {
            font-size: 26px;
            color: #ff0000;
            font-weight: bold;
            margin-bottom: 8px;
            line-height: 1.2;
            text-shadow: 1px 1px 0px #00ffff;
            text-decoration: underline;
            cursor: pointer;
        }

        #movie-percentile {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
            text-shadow: 1px 1px 1px #000;
        }

        .ratings-container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
            width: 100%;
        }

        .rate-line {
            font-size: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            background: #f0f0f0;
            padding: 3px 8px;
            border: 1px outset #fff;
            white-space: nowrap;
            color: #333;
        }

        #rate-naver { border-bottom: 2px solid #2db400; }
        #rate-imdb { border-bottom: 2px solid #f5c518; }
        #rate-rotten { border-bottom: 2px solid #fa320a; }

        #movie-genre {
            font-size: 14px;
            color: var(--win-dark);
        }

        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-direction: column;
        }

        .snipe-btn {
            background: var(--hot-pink);
            color: white;
            border: 4px outset var(--hot-pink);
            padding: 12px 20px;
            font-size: 24px;
            cursor: pointer;
            font-family: 'VT323', monospace;
            text-shadow: 2px 2px #000;
            width: 100%;
            -webkit-appearance: none;
        }

        .copy-btn {
            background: var(--win-gray);
            color: #000;
            border: 3px outset #fff;
            padding: 8px;
            font-size: 18px;
            cursor: pointer;
            font-family: 'VT323', monospace;
            width: 100%;
            margin-top: 5px;
        }

        .copy-btn:active, .snipe-btn:active { border-style: inset; }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #808080;
        }

        @keyframes rainbow {
            0% { color: red; } 20% { color: yellow; } 40% { color: green; } 
            60% { color: blue; } 80% { color: purple; } 100% { color: red; }
        }
        .glitter { animation: rainbow 1s infinite; }
    </style>
</head>
<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">NETFLIX_SNIPER.EXE</div>
            <div class="title-bar-controls">
                <button>_</button>
                <button>&#9633;</button>
                <button>&times;</button>
            </div>
        </div>
        <div class="content">
            <h1>NETFLIX SNIPER</h1>
            <div class="marquee">
                <marquee scrollamount="5">W H A T  T O  W A T C H  T O D A Y ?  -  P I C K  Y O U  D E S T I N Y !</marquee>
            </div>

            <div class="filter-sec">
                <label>TYPE:</label>
                <select id="genre-filter">
                    <option value="ALL">ALL CONTENT</option>
                    <option value="영화">MOVIES (영화)</option>
                    <option value="드라마">SERIES (드라마)</option>
                    <option value="예능">SHOWS (예능)</option>
                    <option value="애니">ANIME (애니)</option>
                    <option value="다큐">DOCO (다큐)</option>
                </select>
            </div>

            <div class="result-box" id="result-box">
                <div id="movie-title" onclick="openNetflix()">READY TO SNIPE?</div>
                <div id="movie-percentile"></div>
                <div class="ratings-container">
                    <div class="rate-line" id="rate-naver">⭐ NAVER: --</div>
                    <div class="rate-line" id="rate-imdb">🎬 IMDb: --</div>
                    <div class="rate-line" id="rate-rotten">🍅 ROTTEN: --</div>
                </div>
                <div id="movie-genre">PUSH THE BUTTON!</div>
            </div>

            <div class="btn-container">
                <button class="snipe-btn" onclick="snipe()">[ SNIPE IT! ]</button>
                <button class="copy-btn" id="copy-btn" onclick="copyResult()" style="display:none;">[ COPY TO CLIPBOARD ]</button>
            </div>

            <div class="footer">
                (C) 2000 CEOK MULTIMEDIA SYSTEM<br>
                <span id="data-counter" style="color:#39ff14;font-size:14px;">LOADING DATA...</span><br>
                <span class="glitter">Best viewed in Netscape 4.0</span>
            </div>
        </div>
    </div>

    <script>
        document.write('<script src="data.js?v=' + new Date().getTime() + '"><\/script>');
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then(reg => {
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                if (confirm("New version available! Reload?")) window.location.reload();
                            }
                        };
                    };
                });
            });
        }

        const HISTORY_KEY = 'sniper_history_v2';
        const HISTORY_SIZE = 50;
        let snipeHistory = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        let lastResult = null;

        function saveHistory(title) {
            snipeHistory.push(title);
            if (snipeHistory.length > HISTORY_SIZE) snipeHistory.shift();
            localStorage.setItem(HISTORY_KEY, JSON.stringify(snipeHistory));
        }

        function openNetflix() {
            if (!lastResult) return;
            window.open(`https://www.netflix.com/search?q=${encodeURIComponent(lastResult.t)}`, '_blank');
        }

        let cleanMovies = [];
        function initData() {
            if (typeof movies === 'undefined') return;
            const seen = new Set();
            cleanMovies = movies.filter(m => {
                if (seen.has(m.t)) return false;
                seen.add(m.t);
                return true;
            });
            document.getElementById('data-counter').textContent = `LOADED: ${cleanMovies.length} TITLES`;
        }

        function playRetroSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
                oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        function copyResult() {
            if (!lastResult) return;
            const grade = getGrade(lastResult.p);
            const text = `[NETFLIX SNIPER 🔫]\n\n오늘의 운명: ${lastResult.t}\n[등급: ${grade.label}]\n[${lastResult.g}] ${lastResult.s}\n⭐NAVER: ${lastResult.r} | 🎬IMDb: ${lastResult.im} | 🍅ROTTEN: ${lastResult.rt}\n\n확인: https://tanesia911.github.io/netflix-sniper/`;
            navigator.clipboard.writeText(text).then(() => alert("복사 완료! 🚀"));
        }

        function getGrade(p) {
            if (p <= 0.5) return { label: "🔱 천계의 명작 (God Tier)", color: "#ff0000" };
            if (p <= 2) return { label: "👑 전설의 레전드 (Legend)", color: "#ff00ff" };
            if (p <= 7) return { label: "💎 국가대표급 수작 (Elite)", color: "#00ffff" };
            if (p <= 15) return { label: "🔥 취향저격 보장 (Hot)", color: "#39ff14" };
            if (p <= 30) return { label: "👍 볼만한 가치 있음 (Fine)", color: "#ffcc00" };
            if (p <= 50) return { label: "😐 그냥저냥 평범함 (Average)", color: "#c0c0c0" };
            if (p <= 75) return { label: "📉 킬링타임용 (Passable)", color: "#808080" };
            return { label: "💩 시간 낭비 주의 (Hard Skip)", color: "#4b2c20" };
        }

        function snipe() {
            if (cleanMovies.length === 0) return;
            const filter = document.getElementById('genre-filter').value;
            const titleEl = document.getElementById('movie-title');
            const naverEl = document.getElementById('rate-naver');
            const imdbEl = document.getElementById('rate-imdb');
            const rottenEl = document.getElementById('rate-rotten');
            const genreEl = document.getElementById('movie-genre');
            const percEl = document.getElementById('movie-percentile');
            const copyBtn = document.getElementById('copy-btn');

            let pool = filter === "ALL" ? cleanMovies : cleanMovies.filter(m => m.g === filter);
            let candidates = pool.filter(m => !snipeHistory.includes(m.t));
            if (candidates.length === 0) { snipeHistory = []; localStorage.removeItem(HISTORY_KEY); candidates = pool; }

            titleEl.classList.remove('glitter'); copyBtn.style.display = 'none'; percEl.innerText = "";
            let count = 0;
            const interval = setInterval(() => {
                const rnd = candidates[Math.floor(Math.random() * candidates.length)];
                titleEl.innerText = rnd.t;
                naverEl.innerText = "⭐ NAVER: " + rnd.r;
                imdbEl.innerText = "🎬 IMDb: " + rnd.im;
                rottenEl.innerText = "🍅 ROTTEN: " + rnd.rt;
                genreEl.innerText = `[${rnd.g}] ${rnd.s}`;
                titleEl.style.color = Math.random() > 0.5 ? '#ff00ff' : '#00ffff';
                count++;
                if (count > 14) {
                    clearInterval(interval);
                    const final = candidates[Math.floor(Math.random() * candidates.length)];
                    lastResult = final; saveHistory(final.t);
                    titleEl.innerText = final.t;
                    naverEl.innerText = "⭐ NAVER: " + final.r;
                    imdbEl.innerText = "🎬 IMDb: " + final.im;
                    rottenEl.innerText = "🍅 ROTTEN: " + final.rt;
                    genreEl.innerText = `[${final.g}] ${final.s}`;
                    const grade = getGrade(final.p);
                    percEl.innerText = `${grade.label} (상위 ${final.p}%)`;
                    percEl.style.color = grade.color;
                    titleEl.style.color = "#ff0000"; titleEl.classList.add('glitter');
                    copyBtn.style.display = 'block'; playRetroSound();
                }
            }, 65);
        }
        window.onload = initData;
    </script>
</body>
</html>
